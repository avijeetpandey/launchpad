version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: launchpad-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: launchpad
      POSTGRES_PASSWORD: launchpad
      POSTGRES_DB: launchpad
    volumes:
      - launchpad-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchpad"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: launchpad-redis
    ports:
      - "6379:6379"

volumes:
  launchpad-postgres-data: